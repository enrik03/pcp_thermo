name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test-and-figures:
    name: Install, Test, Generate Figures
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: pytest tests/ -v --tb=short

      - name: Generate figures
        env:
          MPLBACKEND: Agg
        run: |
          python pcp_thermo_figures_corrected.py \
            --outdir figures/ \
            --dpi 100 \
            --format png,pdf

      - name: Verify figure files exist
        run: |
          for stem in \
            pcp_pressure_comparison_main \
            pcp_pressure_crossover_appendix \
            pcp_pressure_decomposition_appendix; do
            for fmt in png pdf; do
              file="figures/${stem}.${fmt}"
              if [ ! -f "$file" ]; then
                echo "ERROR: missing $file"
                exit 1
              fi
              echo "OK: $file"
            done
          done

      - name: Upload figures as artefact
        uses: actions/upload-artifact@v4
        with:
          name: pcp-figures
          path: figures/
          retention-days: 14
